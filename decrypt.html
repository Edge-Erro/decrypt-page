<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>号码解密</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
</head>
<body style="max-width:400px;margin:50px auto;font-family:sans-serif;">
  <h3>🔐 请输入解密密码</h3>
  <input type="password" id="pwd" placeholder="密码" style="width:100%;padding:8px;"><br><br>
  <button onclick="decrypt()" style="padding:10px 30px;">解密</button>
  <hr>
  <div id="result" style="font-size:20px;font-family:monospace;"></div>

  <script>
    // ====== 这里替换成你的密文（保留引号） ======
    const CIPHER_TEXT = "cryptcode-91781367";
    // =============================================

    function decrypt() {
      const key = document.getElementById('pwd').value.trim();
      if (!key) return;
      try {
        const bytes = CryptoJS.AES.decrypt(CIPHER_TEXT, key);
        const phone = bytes.toString(CryptoJS.enc.Utf8);
        if (!phone) throw new Error('解密失败');
        document.getElementById('result').innerText = phone;
      } catch (e) {
        document.getElementById('result').innerText = '解密失败，请检查密码';
      }
    }
  </script>
</body>
</html>
