<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>解密小工具</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #fbc2eb 0%, #a6c1ee 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', system-ui, sans-serif;
      padding: 20px;
    }
    .card {
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(10px);
      border-radius: 32px;
      padding: 35px 30px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.15);
      max-width: 400px;
      width: 100%;
      text-align: center;
    }
    .icon { font-size: 48px; margin-bottom: 5px; }
    h2 { color: #d63384; margin-bottom: 6px; font-size: 24px; }
    .sub { color: #888; font-size: 14px; margin-bottom: 25px; }
    input[type=password] {
      width: 100%;
      padding: 14px 18px;
      border: 2px solid #f3c4e1;
      border-radius: 18px;
      font-size: 16px;
      margin-bottom: 20px;
      outline: none;
      transition: 0.2s;
      background: #fff5f9;
    }
    input[type=password]:focus { border-color: #e91e63; }
    .btn {
      width: 100%;
      padding: 14px;
      background: #e91e63;
      color: white;
      border: none;
      border-radius: 30px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s;
    }
    .btn:hover { background: #c2185b; transform: scale(1.02); }
    #result {
      margin-top: 25px;
      padding: 20px;
      background: #fff0f5;
      border-radius: 18px;
      font-size: 22px;
      font-weight: 600;
      color: #b0306a;
      word-break: break-all;
      min-height: 60px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Courier New', monospace;
    }
    .err { color: #c62828; font-weight: normal; font-size: 16px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">🍬</div>
    <h2>解密一下</h2>
    <div class="sub">输入密码查看内容</div>
    <input type="password" id="pwd" placeholder="密码">
    <button class="btn" onclick="decrypt()">✨ 解密</button>
    <div id="result"></div>
  </div>

  <script>
    // ========== 把上一工具验证通过的密文替换到这里（保留双引号） ==========
    const CIPHER_TEXT = "U2FsdGVkX1+xxxxxxxxxx";
    // ==================================================================

    function decrypt() {
      const pwd = document.getElementById('pwd').value.trim();
      const res = document.getElementById('result');
      if (!pwd) return;
      if (pwd !== 'cryptcode-91781367') {
        res.innerText = '密码不对哦';
        res.className = 'err';
        return;
      }
      try {
        const bytes = CryptoJS.AES.decrypt(CIPHER_TEXT, pwd);
        const phone = bytes.toString(CryptoJS.enc.Utf8);
        if (!phone) throw new Error();
        res.innerText = phone;
        res.className = '';
      } catch (e) {
        res.innerText = '解密失败，密文可能损坏';
        res.className = 'err';
      }
    }
    // 回车触发
    document.getElementById('pwd').addEventListener('keypress', e => {
      if (e.key === 'Enter') decrypt();
    });
  </script>
</body>
</html>
